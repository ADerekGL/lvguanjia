version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: smart-hotel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: smart_hotel
      MYSQL_USER: hotel_user
      MYSQL_PASSWORD: hotel_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - smart-hotel-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: smart-hotel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass redispassword
    networks:
      - smart-hotel-network

  # 后端 API 服务
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: smart-hotel-server
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: hotel_user
      DB_PASSWORD: hotel_password
      DB_DATABASE: smart_hotel
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redispassword
      JWT_SECRET: your_jwt_secret_key_here_change_in_production
      WECHAT_APPID: ${WECHAT_APPID}
      WECHAT_SECRET: ${WECHAT_SECRET}
      VOLCANO_ACCESS_KEY: ${VOLCANO_ACCESS_KEY}
      VOLCANO_SECRET_KEY: ${VOLCANO_SECRET_KEY}
    ports:
      - "3000:3000"
      - "3001:3001"  # WebSocket 端口
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - smart-hotel-network

  # 前端 Web 应用
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: smart-hotel-web
    restart: unless-stopped
    depends_on:
      - server
    environment:
      REACT_APP_API_URL: http://localhost:3000
      REACT_APP_WS_URL: ws://localhost:3001
    ports:
      - "8080:80"
    volumes:
      - ./web:/app
      - /app/node_modules
    networks:
      - smart-hotel-network

  # Nginx 反向代理 (生产环境使用)
  nginx:
    image: nginx:alpine
    container_name: smart-hotel-nginx
    restart: unless-stopped
    depends_on:
      - server
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./web/build:/usr/share/nginx/html
      - ./docker/nginx/ssl:/etc/nginx/ssl
    networks:
      - smart-hotel-network

  # phpMyAdmin (数据库管理)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: smart-hotel-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8081:80"
    networks:
      - smart-hotel-network

  # Redis Commander (Redis 管理)
  redis-commander:
    image: rediscommander/rediscommander:latest
    container_name: smart-hotel-redis-commander
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_HOSTS: local:redis:6379
      REDIS_PASSWORD: redispassword
    ports:
      - "8082:8081"
    networks:
      - smart-hotel-network

networks:
  smart-hotel-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data: