version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: smart-hotel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-smart_hotel}
      MYSQL_USER: ${DB_USERNAME:-hotel_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hotel_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - smart-hotel-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: smart-hotel-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    networks:
      - smart-hotel-network

  # 后端 API 服务
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smart-hotel-server
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:-hotel_user}
      DB_PASSWORD: ${DB_PASSWORD:-hotel_password}
      DB_DATABASE: ${DB_DATABASE:-smart_hotel}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispassword}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ARK_API_KEY: ${ARK_API_KEY:-}
      ARK_MODEL_ID: ${ARK_MODEL_ID:-doubao-1-5-pro-32k-250115}
      FEATURE_AI_ENABLED: ${FEATURE_AI_ENABLED:-false}
      FEATURE_PAYMENT_ENABLED: ${FEATURE_PAYMENT_ENABLED:-false}
      FEATURE_WECHAT_LOGIN: ${FEATURE_WECHAT_LOGIN:-false}
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
    ports:
      - "3000:3000"
    networks:
      - smart-hotel-network

  # 访客 H5 前端
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: smart-hotel-web
    restart: unless-stopped
    networks:
      - smart-hotel-network

  # 系统管理面板
  sysadmin:
    build:
      context: ./sysadmin
      dockerfile: Dockerfile
    container_name: smart-hotel-sysadmin
    restart: unless-stopped
    networks:
      - smart-hotel-network

  # 酒店管理面板
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: smart-hotel-admin
    restart: unless-stopped
    networks:
      - smart-hotel-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: smart-hotel-nginx
    restart: unless-stopped
    depends_on:
      - server
      - web
      - sysadmin
      - admin
    ports:
      - "80:80"
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./index.html:/usr/share/nginx/html/landing/index.html:ro
    networks:
      - smart-hotel-network

  # phpMyAdmin (数据库管理，仅开发环境)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: smart-hotel-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    ports:
      - "8081:80"
    networks:
      - smart-hotel-network
    profiles:
      - dev

networks:
  smart-hotel-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data: